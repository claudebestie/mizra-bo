<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mizra BO — Custom Requests</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#f5f3ef;color:#1a1a2e;min-height:100vh}
header{background:#1a1a2e;color:#fff;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
header h1{font-size:1.15rem;font-weight:600}
header h1 span{color:#d4643a;font-weight:700}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filters button{padding:6px 14px;border:1px solid rgba(255,255,255,.2);border-radius:100px;background:transparent;color:#fff;font-size:.78rem;font-family:inherit;cursor:pointer;transition:all .2s}
.filters button:hover{border-color:#d4643a;color:#d4643a}
.filters button.active{background:#d4643a;border-color:#d4643a;color:#fff}
.count{font-size:.75rem;color:rgba(255,255,255,.5);margin-left:4px}
main{padding:24px 32px;max-width:1200px;margin:0 auto}
.stats{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e5e2dc;border-radius:10px;padding:16px 20px;flex:1;min-width:120px}
.stat-num{font-size:1.8rem;font-weight:700;color:#1a1a2e}
.stat-label{font-size:.75rem;color:#8a857c;margin-top:2px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
thead{background:#f9f8f5}
th{text-align:left;padding:12px 16px;font-size:.75rem;font-weight:600;color:#8a857c;text-transform:uppercase;letter-spacing:.5px}
td{padding:14px 16px;font-size:.88rem;border-top:1px solid #f0ede8}
tr{cursor:pointer;transition:background .15s}
tr:hover td{background:#faf9f6}
.badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:.7rem;font-weight:600;letter-spacing:.3px}
.badge-new{background:#fff3e0;color:#d4643a}
.badge-contacted{background:#e3f2fd;color:#1565c0}
.badge-quoted{background:#fff8e1;color:#f9a825}
.badge-accepted{background:#e8f5e9;color:#2e7d32}
.badge-rejected{background:#fce4ec;color:#c62828}
.badge-archived{background:#f5f5f5;color:#757575}
.services-tags{display:flex;gap:4px;flex-wrap:wrap}
.svc-tag{background:#f0ede8;color:#1a1a2e;padding:2px 8px;border-radius:4px;font-size:.7rem}
.empty{text-align:center;padding:64px;color:#8a857c}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:20}
.overlay.open{display:block}
.panel{position:fixed;top:0;right:-500px;width:480px;max-width:90vw;height:100vh;background:#fff;z-index:21;transition:right .3s;overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,.1)}
.panel.open{right:0}
.panel-header{padding:24px;border-bottom:1px solid #f0ede8;display:flex;justify-content:space-between;align-items:center}
.panel-header h2{font-size:1.1rem;font-weight:600}
.panel-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#8a857c;padding:4px 8px}
.panel-body{padding:24px}
.panel-field{margin-bottom:20px}
.panel-field label{display:block;font-size:.72rem;font-weight:600;color:#8a857c;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.panel-field .val{font-size:.9rem;line-height:1.6;color:#1a1a2e}
.panel-field textarea,.panel-field select{width:100%;padding:10px;border:1px solid #e5e2dc;border-radius:8px;font-family:inherit;font-size:.88rem;resize:vertical}
.panel-field textarea{min-height:80px}
.panel-save{background:#d4643a;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.panel-save:hover{background:#c0572f}
.desc-text{white-space:pre-wrap;background:#f9f8f5;padding:16px;border-radius:8px;font-size:.88rem;line-height:1.7}
.panel-date{font-size:.78rem;color:#8a857c}
@media(max-width:768px){
  header{padding:12px 16px;flex-direction:column;gap:12px}
  main{padding:16px}
  .panel{width:100%;max-width:100%}
  th:nth-child(4),td:nth-child(4){display:none}
}
</style>
</head>
<body>

<header>
  <h1><span>mizra</span>.bo — Custom Requests</h1>
  <div class="filters" id="filters">
    <button class="active" data-s="all">All <span class="count" id="cnt-all"></span></button>
    <button data-s="new">New <span class="count" id="cnt-new"></span></button>
    <button data-s="contacted">Contacted</button>
    <button data-s="quoted">Quoted</button>
    <button data-s="accepted">Accepted</button>
    <button data-s="rejected">Rejected</button>
  </div>
</header>

<main>
  <div class="stats" id="stats"></div>
  <table>
    <thead><tr><th>Date</th><th>Name</th><th>Email</th><th>Services</th><th>Budget</th><th>Status</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">No requests found.</div>
</main>

<div class="overlay" id="overlay"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <h2 id="p-name"></h2>
    <button class="panel-close" id="panelClose">&times;</button>
  </div>
  <div class="panel-body">
    <div class="panel-field"><label>Date</label><div class="val" id="p-date"></div></div>
    <div class="panel-field"><label>Email</label><div class="val" id="p-email"></div></div>
    <div class="panel-field"><label>Phone</label><div class="val" id="p-phone"></div></div>
    <div class="panel-field"><label>Services</label><div class="val" id="p-services"></div></div>
    <div class="panel-field"><label>Budget</label><div class="val" id="p-budget"></div></div>
    <div class="panel-field"><label>Project Description</label><div class="desc-text" id="p-desc"></div></div>
    <hr style="border:none;border-top:1px solid #f0ede8;margin:24px 0">
    <div class="panel-field">
      <label>Status</label>
      <select id="p-status">
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="quoted">Quoted</option>
        <option value="accepted">Accepted</option>
        <option value="rejected">Rejected</option>
        <option value="archived">Archived</option>
      </select>
    </div>
    <div class="panel-field">
      <label>Admin Notes</label>
      <textarea id="p-notes" placeholder="Internal notes..."></textarea>
    </div>
    <button class="panel-save" id="p-save">Save Changes</button>
  </div>
</div>

<script>
const SB='https://rofkgmwjggvxlgrdnsyt.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvZmtnbXdqZ2d2eGxncmRuc3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MzA2MTgsImV4cCI6MjA4NzUwNjYxOH0.6nlnX-0wUlID-630j5fOyveEAG0Lrp2gWhgGMRKpmNk';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};

let data=[];
let allData=[];
let current=null;
let filter='all';

const svcLabels={
  multi_page:'Multi-page',ecommerce:'E-commerce',booking:'Booking',portfolio:'Portfolio',
  blog:'Blog',multilingual:'Multilingual',integrations:'Integrations',mobile_landing:'App Landing',
  redesign:'Redesign',dashboard:'Dashboard',seo:'SEO',other:'Other'
};

async function load(){
  const r=await fetch(SB+'/rest/v1/custom_requests?order=created_at.desc',{headers:H});
  allData=await r.json();
  applyFilter();
}

function applyFilter(){
  data=filter==='all'?allData:allData.filter(d=>d.status===filter);
  render();
}

function render(){
  const tb=document.getElementById('tbody');
  const empty=document.getElementById('empty');
  if(!data.length){tb.innerHTML='';empty.style.display='';document.getElementById('stats').innerHTML='';return}
  empty.style.display='none';
  tb.innerHTML=data.map((d,i)=>{
    const dt=new Date(d.created_at).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
    const svcs=(d.services||[]).slice(0,3).map(s=>'<span class="svc-tag">'+(svcLabels[s]||s)+'</span>').join('')+((d.services||[]).length>3?'<span class="svc-tag">+'+((d.services||[]).length-3)+'</span>':'');
    return '<tr onclick="openPanel('+i+')"><td>'+dt+'</td><td><strong>'+esc(d.name)+'</strong></td><td>'+esc(d.email)+'</td><td><div class="services-tags">'+svcs+'</div></td><td>'+(d.budget_range||'—')+'</td><td><span class="badge badge-'+d.status+'">'+d.status+'</span></td></tr>';
  }).join('');

  document.getElementById('cnt-all').textContent=allData.length;
  const nc=allData.filter(d=>d.status==='new').length;
  document.getElementById('cnt-new').textContent=nc||'';

  const stats=document.getElementById('stats');
  const qc=allData.filter(d=>d.status==='quoted').length;
  const ac=allData.filter(d=>d.status==='accepted').length;
  stats.innerHTML=
    '<div class="stat"><div class="stat-num">'+allData.length+'</div><div class="stat-label">Total Requests</div></div>'+
    '<div class="stat"><div class="stat-num" style="color:#d4643a">'+nc+'</div><div class="stat-label">New</div></div>'+
    '<div class="stat"><div class="stat-num" style="color:#f9a825">'+qc+'</div><div class="stat-label">Quoted</div></div>'+
    '<div class="stat"><div class="stat-num" style="color:#2e7d32">'+ac+'</div><div class="stat-label">Accepted</div></div>';
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function openPanel(i){
  current=data[i];
  document.getElementById('p-name').textContent=current.name;
  document.getElementById('p-date').textContent=new Date(current.created_at).toLocaleString('en-GB');
  document.getElementById('p-email').innerHTML='<a href="mailto:'+esc(current.email)+'">'+esc(current.email)+'</a>';
  document.getElementById('p-phone').textContent=current.phone||'—';
  document.getElementById('p-services').innerHTML=(current.services||[]).map(s=>'<span class="svc-tag" style="margin:2px">'+(svcLabels[s]||s)+'</span>').join(' ')||'—';
  document.getElementById('p-budget').textContent=current.budget_range||'—';
  document.getElementById('p-desc').textContent=current.description||'—';
  document.getElementById('p-status').value=current.status||'new';
  document.getElementById('p-notes').value=current.admin_notes||'';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
}

function closePanel(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  current=null;
}

document.getElementById('panelClose').onclick=closePanel;
document.getElementById('overlay').onclick=closePanel;

document.getElementById('p-save').onclick=async function(){
  if(!current) return;
  const btn=this;
  btn.textContent='Saving...';btn.disabled=true;
  const updates={
    status:document.getElementById('p-status').value,
    admin_notes:document.getElementById('p-notes').value
  };
  await fetch(SB+'/rest/v1/custom_requests?id=eq.'+current.id,{
    method:'PATCH',headers:H,body:JSON.stringify(updates)
  });
  btn.textContent='Saved!';btn.style.background='#2e7d32';
  setTimeout(()=>{btn.textContent='Save Changes';btn.style.background='';btn.disabled=false},1500);
  current.status=updates.status;current.admin_notes=updates.admin_notes;
  // Update in allData too
  const idx=allData.findIndex(d=>d.id===current.id);
  if(idx>=0){allData[idx].status=updates.status;allData[idx].admin_notes=updates.admin_notes}
  applyFilter();
};

document.querySelectorAll('.filters button').forEach(btn=>{
  btn.onclick=function(){
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    filter=this.dataset.s;
    applyFilter();
  };
});

load();
</script>
</body>
</html>
